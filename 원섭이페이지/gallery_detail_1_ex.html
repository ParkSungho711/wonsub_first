<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<style>
        /* 로고 스타일 (기존 유지) */
        .logo {
            text-align: center;
            font-size: 30px;
            font-weight: 1000;
            color: palevioletred;
            padding: 20px 0;
            margin: 0;
        }

        /* 메인 컨테이너 */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px; /* 각 섹션 사이의 간격 */
        }

        /* 이미지 & 설명 영역 (가로 배치) */
        .content-section {
            display: flex;
            gap: 20px;
        }

        /* 이미지 영역 (좌측, 더 넓게) */
        .img-box {
            flex: 2.5; /* 설명 영역보다 2.5배 넓게 차지 */
            border: 3px solid #00bfff; /* 스케치의 하늘색 테두리 */
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
        }

        .img-box img {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain; /* 이미지가 잘리지 않고 비율 유지 */
        }

        /* 설명 영역 (우측) */
        .desc-box {
            flex: 1; /* 이미지 영역보다 좁게 차지 */
            border: 3px solid #4169e1; /* 스케치의 파란색 테두리 */
            padding: 20px;
        }

        /* 댓글 영역 */
        .comments-box {
            border: 3px solid #ba55d3; /* 스케치의 보라색 테두리 */
            padding: 20px;
            min-height: 150px;
        }

        /* 댓글 쓰기 영역 */
        .comment-write-box {
            border: 3px solid #da70d6; /* 스케치의 핑크/보라색 테두리 */
            padding: 20px;
        }

        /* 모바일 화면 대응 (화면이 좁아지면 세로로 배치) */
        @media (max-width: 768px) {
            .content-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <h1 class="logo">마키마키마</h1>

    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="\원섭이페이지\list.html">게시판</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">갤러리</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">뉴스</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="\원섭이페이지\login.html">로그인</a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        
        <div class="content-section">
            <div class="img-box">
                <img src="\원섭이페이지\img\makima1.jpg" alt="미소짓는 마키마 큰 이미지">
            </div>
            <div class="desc-box">
                <h3>미소짓는 마키마</h3>
                <hr>
                <p>여기에 캐릭터에 대한 상세 설명이나 사진에 대한 글이 들어갑니다.</p>
                <p>속성: 악마<br>특징: 예쁨</p>
            </div>
        </div>

        <div class="comments-box">
            <h4>댓글 (3)</h4>
            <hr>
            <p><strong>익명1:</strong> 와 정말 멋진 사진이네요!</p>
            <p><strong>익명2:</strong> 최고입니다 ㅎㅎ</p>
        </div>

        <div class="comment-write-box">
            <form>
                <div class="mb-3">
                    <label for="commentInput" class="form-label">댓글 달기</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="commentInput" placeholder="댓글을 입력해주세요.">
                        <button class="btn btn-primary" type="button">등록</button>
                    </div>
                </div>
            </form>
        </div>

    </main>
</body>
</html>
